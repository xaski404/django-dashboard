{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaloguj się — Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card fade-in">
            <div class="auth-logo">
                <div class="auth-logo-icon">🚀</div>
                <div class="auth-logo-text">Dashboard</div>
                <div class="auth-logo-sub">Zaloguj się do swojego konta</div>
            </div>

            {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                <li class="message {{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}

            <form method="post" class="auth-form" id="login-form">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username" class="form-label">Nazwa użytkownika</label>
                    <input type="text" name="username" class="form-input" id="id_username" placeholder="Wpisz login..." autofocus required>
                </div>
                <div class="form-group">
                    <label for="id_password" class="form-label">Hasło</label>
                    <input type="password" name="password" class="form-input" id="id_password" placeholder="Wpisz hasło..." required>
                </div>
                <button type="submit" class="btn btn-primary" id="btn-login">🔐 Zaloguj się</button>
            </form>

            <div class="auth-footer">
                Nie masz konta? <a href="{% url 'register' %}" id="link-register">Zarejestruj się</a>
            </div>
        </div>
    </div>
</body>
</html>
